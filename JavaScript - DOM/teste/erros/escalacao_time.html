<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escalação de time</title>
  <style>
    body{
      background-color: black;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: top;
      height: 100vh;
    }
    button{
      width: 200px;
      height: 40px;
      color: white;
      font-size: 16px;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(to right,rgb(28, 189, 28),rgb(39, 190, 127));
      margin-bottom: 20px;
    }
    ul {
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <h1>Escalação de time</h1>
  <di class="buttons">
    <button class="btnClimbTeam" onclick="addPlayer()">Escalar um jogador</button>
    <button class="btnClimbTeam" onclick="removePlayer()">Remover jogador</button>
  </di>
  
  <div id="escalarTime">

  </div>
  <div id="buttonConfirm">
    
  </div>
  <section id="timeSection">
    <h1>Time: </h1>
  </section>
  
  <script src="escalacao_time.js"></script>

</html>
